name: Deploy Firebase Hosting (+ Optional Functions)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy_hosting:
    name: Build + Deploy Firebase
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY || secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN || secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID || secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET || secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID || secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID || secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_FUNCTIONS_REGION: ${{ vars.VITE_FIREBASE_FUNCTIONS_REGION || 'us-central1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies (when enabled)
        if: vars.ENABLE_FUNCTIONS_DEPLOY == 'true'
        run: npm ci --prefix functions

      - name: Validate Firebase env
        run: npm run check:env

      - name: Run unit tests
        run: npm run test:unit

      - name: Build app
        run: npm run build

      - name: Deploy to Firebase (hosting always, functions optional)
        run: |
          if [ "${{ vars.ENABLE_FUNCTIONS_DEPLOY }}" = "true" ]; then
            echo "ENABLE_FUNCTIONS_DEPLOY=true -> deploying hosting + functions."
            npx firebase-tools deploy --only hosting,functions --project tonicatering --non-interactive
          else
            echo "Deploying hosting only. Set repo variable ENABLE_FUNCTIONS_DEPLOY=true after upgrading the Firebase project to Blaze."
            npx firebase-tools deploy --only hosting --project tonicatering --non-interactive
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
