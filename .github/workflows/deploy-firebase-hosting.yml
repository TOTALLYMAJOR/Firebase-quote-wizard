name: Deploy Firebase Hosting + Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy_hosting:
    name: Build + Deploy Hosting/Functions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build app
        run: npm run build

      - name: Deploy to Firebase Hosting + Functions
        run: npx firebase-tools deploy --only hosting,functions --project tonicatering --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
