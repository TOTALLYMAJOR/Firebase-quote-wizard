name: CI Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit_and_build:
    name: Unit + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build app
        run: npm run build

  playwright_smoke:
    name: Playwright Smoke
    runs-on: ubuntu-latest
    needs: unit_and_build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser + Linux deps
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        run: npm run test:e2e

      - name: Upload Playwright report (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload Playwright traces (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
