name: CI Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit_and_build:
    name: Unit + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build app
        run: npm run build

  governance_and_perf:
    name: Governance + Perf Gates
    runs-on: ubuntu-latest
    needs: unit_and_build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run documentation governance checks
        run: npm run check:docs:governance

      - name: Build app for performance checks
        run: npm run build

      - name: Enforce bundle budget
        run: npm run check:perf:bundle

      - name: Install Playwright browser + Linux deps for Lighthouse
        run: npx playwright install --with-deps chromium

      - name: Resolve Chromium path for Lighthouse
        run: echo "CHROME_PATH=$(node -e 'const { chromium } = require(\"playwright\"); process.stdout.write(chromium.executablePath());')" >> "$GITHUB_ENV"

      - name: Run CWV smoke gate
        run: npm run check:perf:cwv
        env:
          LHCI_COLLECT__CHROME_PATH: ${{ env.CHROME_PATH }}

  docker_build_smoke:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    needs: unit_and_build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production Docker image
        run: docker compose build web

  playwright_smoke:
    name: Playwright Smoke
    runs-on: ubuntu-latest
    needs: unit_and_build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser + Linux deps
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        run: npm run test:e2e

      - name: Upload Playwright report (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload Playwright traces (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/

  playwright_firebase_smoke:
    name: Playwright Firebase Smoke
    runs-on: ubuntu-latest
    needs: unit_and_build
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser + Linux deps
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Firebase emulator smoke suite
        run: npm run test:e2e:firebase

      - name: Upload Playwright report (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-firebase-report
          path: playwright-report/

      - name: Upload Playwright traces (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-firebase-traces
          path: test-results/

  playwright_firebase_authoritative_smoke:
    name: Playwright Firebase Authoritative Smoke
    runs-on: ubuntu-latest
    needs: unit_and_build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser + Linux deps
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Firebase authoritative pricing smoke suite
        run: npm run test:e2e:firebase:authoritative

      - name: Upload Playwright report (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-firebase-authoritative-report
          path: playwright-report/

      - name: Upload Playwright traces (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-firebase-authoritative-traces
          path: test-results/
